<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CISCE – E-Pathshala</title>
    <!-- Google Fonts (matching landing.html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ---------- RESET & BASE (matching landing theme) ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: #0b0806;
            color: #e6dccb;
            padding: 20px;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(212, 175, 55, 0.04) 0%, transparent 3%),
                radial-gradient(circle at 85% 70%, rgba(212, 175, 55, 0.04) 0%, transparent 3%),
                radial-gradient(circle at 50% 50%, rgba(107, 29, 42, 0.08) 0%, transparent 40%);
        }

        /* ---------- GRAND COLOR VARIABLES (same as landing) ---------- */
        :root {
            --gold: #D4AF37;
            --gold-light: #E8C84A;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --maroon: #6B1D2A;
            --saffron: #FF8C00;
            --dark-bg: #0b0806;
            --card-bg: #1a1410;
            --card-border: #3d2b1f;
            --text-primary: #f0e6d8;
            --text-secondary: #c4b5a0;
            --text-muted: #8a7a66;
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            --radius: 16px;
        }

        /* ---------- CARD CONTAINER (opulent glass) ---------- */
        .wrapper {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: 30px 35px 40px;
            background: rgba(20, 15, 12, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(212, 175, 55, 0.15);
            transition: box-shadow 0.3s ease;
            position: relative;
        }

        .wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius);
            border: 1px solid rgba(212, 175, 55, 0.08);
            pointer-events: none;
        }

        .wrapper:hover {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(212, 175, 55, 0.03);
        }

        /* ---------- TOP BAR: Logo + Back Button ---------- */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 18px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .logo i {
            color: var(--saffron);
            font-size: 1.8rem;
            filter: drop-shadow(0 0 6px rgba(255, 140, 0, 0.3));
        }

        .logo span {
            color: var(--text-primary);
            font-weight: 300;
            font-family: 'Poppins', sans-serif;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 50px;
            border: 1.5px solid rgba(212, 175, 55, 0.25);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .back-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
            transform: translateX(-4px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .back-btn i {
            font-size: 1rem;
        }

        /* ---------- HEADING ---------- */
        .heading {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-family: 'Playfair Display', serif;
        }

        .heading .highlight {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        .subheading {
            font-size: clamp(0.95rem, 1.2vw, 1.15rem);
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ---------- BUTTON GROUP ---------- */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 6px;
        }

        /* ---------- PRIMARY BUTTON (gold gradient) ---------- */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            background: linear-gradient(135deg, var(--gold), #b8960f);
            color: #0b0806;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 60px;
            border: none;
            box-shadow: 0 8px 28px rgba(212, 175, 55, 0.3);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent 60%);
            pointer-events: none;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--saffron), var(--gold-light));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .btn-primary:hover::after {
            opacity: 0.2;
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 48px rgba(212, 175, 55, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary span,
        .btn-primary svg {
            position: relative;
            z-index: 1;
        }

        .btn-primary .arrow {
            transition: transform 0.35s ease;
            display: inline-block;
        }

        .btn-primary:hover .arrow {
            transform: translateX(6px) scale(1.1);
        }

        /* ---------- SECONDARY OUTLINE BUTTON (gold border) ---------- */
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: transparent;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 60px;
            border: 2px solid rgba(212, 175, 55, 0.25);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary:active {
            transform: scale(0.97);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .wrapper {
                padding: 20px 16px 28px;
                border-radius: 28px;
            }

            .top-bar {
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }

            .logo {
                font-size: 1.4rem;
            }

            .back-btn {
                font-size: 0.85rem;
                padding: 6px 14px;
            }

            .btn-primary {
                padding: 14px 20px;
                font-size: 0.9rem;
                width: 100%;
                justify-content: center;
            }

            .btn-secondary {
                padding: 12px 20px;
                font-size: 0.85rem;
                width: 100%;
                justify-content: center;
            }

            .btn-group {
                flex-direction: column;
                width: 100%;
            }
        }

        /* ---------- ACCESSIBILITY ---------- */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        .btn-primary:focus-visible,
        .btn-secondary:focus-visible,
        .back-btn:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 4px;
        }

        ::selection {
            background: var(--gold);
            color: #0b0806;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- TOP BAR: E-Pathshala Branding + Back Button -->
        <div class="top-bar">
            <a href="landing.html" class="logo" style="text-decoration: none;">
                <i class="fas fa-graduation-cap"></i>
                E-<span>Pathshala</span>
            </a>
            <a href="landing.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>

        <!-- main heading -->
        <h1 class="heading">
            <span class="highlight">CISCE</span>
        </h1>
        <p class="subheading">Council for the Indian School Certificate Examinations</p>

        <!-- button group -->
        <div class="btn-group">
            <!-- primary button – links to CISCE -->
            <a href="https://www.cisce.org/" target="_blank" rel="noopener noreferrer" class="btn-primary">
                <span>Visit CISCE Website</span>
                <span class="arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </span>
            </a>

            <!-- secondary outline button – alternative link -->
            <a href="https://www.cisce.org/" target="_blank" rel="noopener noreferrer" class="btn-secondary">
                <span>Go to CISCE</span>
            </a>
        </div>
    </div>

</html>
